# Stdlib rules for pure SubcommandHandler-based tools.
# These replace the compiled handlers in src/handlers/simple.rs.
# Order: catch-all ask first, then allow overrides (last-match-wins).

# ── Cargo ──────────────────────────────────────────────────────────────

[[rules]]
action = "ask"
command = "cargo"

[[rules]]
action = "allow"
command = "cargo"
subcommands = [
    "help", "version", "search", "info", "tree", "metadata",
    "read-manifest", "locate-project", "pkgid", "verify-project",
    "build", "test", "bench", "check", "clippy", "fmt", "doc", "clean", "nextest",
    "fetch", "generate-lockfile", "update", "vendor",
    "login", "logout", "owner",
    "audit", "deny", "expand", "outdated", "bloat", "machete",
    "llvm-lines", "udeps", "depgraph", "msrv",
]

